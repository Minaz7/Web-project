<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Mr. Bean Coffee</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="images/logo.jpg" alt="Mr. Bean Coffee" class="logo-img">
    <span>Mr. Bean Coffee</span>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="contact.html">Contact</a>
  </nav>
  <div class="cart-icon">🛒 <span class="cart-count">0</span></div>
</header>

<div id="checkout-wrap" class="checkout-wrap">
  <div class="checkout-form-section">
    <h2>Your Details</h2>
    <form id="checkoutForm">
      <div class="form-group">
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname">
      </div>
      <div class="form-group">
        <label for="co-email">Email Address</label>
        <input type="email" id="co-email">
      </div>
      <div class="form-group">
        <label for="address">Delivery Address</label>
        <input type="text" id="address">
      </div>
      <div class="form-group">
        <label for="card">Card Number</label>
        <input type="text" id="card">
      </div>
      <button type="submit">Place Order</button>
    </form>
  </div>

  <div class="checkout-summary-section">
    <h2>Order Summary</h2>
    <div id="order-summary"></div>
    <div class="order-total-row">
      <p>Total</p>
      <p id="order-total">0 EGP</p>
    </div>
  </div>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-brand">
      <h3>Mr. Bean Coffee</h3>
      <p>Single origin , Ethically sourced , Fresh roasted</p>
    </div>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>
</body>
</html>
