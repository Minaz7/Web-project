<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout &mdash; Mr. Beans Coffee</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="/images/logo.jpg" alt="Mr. Beans Coffee" class="logo-img">
    <span>Mr. Beans Coffee</span>
  </div>
  <nav>
    <a href="/" data-i18n="home">Home</a>
    <a href="/shop" data-i18n="shop">Shop</a>
    <a href="/contact" data-i18n="contact">Contact</a>
  </nav>
  <div class="cart-icon">&#128722; <span class="cart-count">0</span></div>
</header>

<div id="checkout-main">
  <div class="checkout-container">
    <div class="order-items">
      <h2 data-i18n="yourOrder">Your Order</h2>
      <div id="order-summary-list"></div>
    </div>

    <div class="checkout-form">
      <h2 data-i18n="deliveryDetails">Delivery Details</h2>
      <form id="checkoutForm">
        <div class="form-group">
          <label for="fullname" data-i18n="fullNameCheckout">Full Name</label>
          <input type="text" id="fullname" placeholder="Ahmed Hassan">
          <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email" data-i18n="emailCheckout">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com">
          <span class="error-msg" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="address" data-i18n="addressLabel">Delivery Address</label>
          <input type="text" id="address" placeholder="Street, City, Country">
          <span class="error-msg" id="address-error"></span>
        </div>

        <div class="form-group">
          <label data-i18n="paymentMethod">Payment Method</label>
          <div style="display: flex; gap: 20px; margin-top: 8px;">
            <label style="display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="payment" value="card" checked> <span data-i18n="creditCard">Credit Card</span>
            </label>
            <label style="display: flex; align-items: center; gap: 8px;">
              <input type="radio" name="payment" value="cash"> <span data-i18n="cashOnDelivery">Cash on Delivery</span>
            </label>
          </div>
        </div>

        <div class="form-group" id="card-group">
          <label for="card" data-i18n="cardLabel">Card Number (16 digits, numbers only)</label>
          <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19">
          <span class="error-msg" id="card-error"></span>
        </div>

        <button type="submit" class="place-order-btn" data-i18n="placeOrder">Place Order</button>
      </form>
    </div>
  </div>
</div>

<div id="order-success" class="success-message" style="display:none;">
  <h2 data-i18n="orderPlaced">Order Placed!</h2>
  <p data-i18n="orderThanks">Thank you for your order. Your beans are on their way.</p>
  <a href="/" data-i18n="backToHome">Back to Home</a>
</div>

<footer>
  <div class="footer-content">
    <div class="footer-brand">
      <h3>Mr. Beans Coffee</h3>
      <p data-i18n="footerTagline">Single origin &middot; Ethically sourced &middot; Fresh roasted</p>
    </div>
    <div class="footer-links">
      <a href="/" data-i18n="home">Home</a>
      <a href="/shop" data-i18n="shop">Shop</a>
      <a href="/contact" data-i18n="contact">Contact</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p data-i18n="footerCopy">&copy; 2026 <strong>Mr. Beans Coffee</strong> &mdash; All rights reserved.</p>
  </div>
</footer>

<script src="/js/i18n.js"></script>
<script src="/js/currency.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script>
  function loadCart() {
    return JSON.parse(localStorage.getItem('coffeeCart') || '[]');
  }

  function saveCart(cart) {
    localStorage.setItem('coffeeCart', JSON.stringify(cart));
  }

  function updateHeaderBadge() {
    const cart = loadCart();
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    document.querySelectorAll('.cart-count').forEach(el => {
      el.textContent = total;
    });
  }

  function renderOrderSummary() {
  let cart = loadCart();
  const container = document.getElementById('order-summary-list');

  if (cart.length === 0) {
    container.innerHTML = '<div class="empty-cart">Your cart is empty. <a href="/shop">Go back to shop</a></div>';
    return;
  }

  let html = '';
  let total = 0;

  cart.forEach((item, index) => {
    const itemTotal = item.price * item.qty;
    total += itemTotal;
    html += `
      <div class="order-item" data-index="${index}">
        <div class="order-item-info">
          <div class="order-item-name">${item.name}</div>
          <div style="display: flex; align-items: center; gap: 12px; margin-top: 8px;">
            <button class="qty-btn minus-btn" data-name="${item.name}">-</button>
            <span class="item-qty">${item.qty}</span>
            <button class="qty-btn plus-btn" data-name="${item.name}">+</button>
            <button class="remove-item" data-name="${item.name}">Remove</button>
          </div>
        </div>
        <div class="order-item-price">
          ${itemTotal} EGP
        </div>
      </div>
    `;
  });

  html += `<div class="order-total"><span>Total</span><span>${total} EGP</span></div>`;
  container.innerHTML = html;

  document.querySelectorAll('.plus-btn').forEach(btn => {
    btn.onclick = function() {
      const name = this.getAttribute('data-name');
      let cart = loadCart();
      const item = cart.find(i => i.name === name);
      if (item) {
        item.qty++;
        saveCart(cart);
        updateHeaderBadge();
        renderOrderSummary();
      }
    };
  });

  document.querySelectorAll('.minus-btn').forEach(btn => {
    btn.onclick = function() {
      const name = this.getAttribute('data-name');
      let cart = loadCart();
      const item = cart.find(i => i.name === name);
      if (item && item.qty > 1) {
        item.qty--;
        saveCart(cart);
        updateHeaderBadge();
        renderOrderSummary();
      } else if (item && item.qty === 1) {
        cart = cart.filter(i => i.name !== name);
        saveCart(cart);
        updateHeaderBadge();
        renderOrderSummary();
      }
    };
  });

  document.querySelectorAll('.remove-item').forEach(btn => {
    btn.onclick = function() {
      const nameToRemove = this.getAttribute('data-name');
      let cart = loadCart();
      cart = cart.filter(item => item.name !== nameToRemove);
      saveCart(cart);
      updateHeaderBadge();
      renderOrderSummary();
    };
  });
}

  function validateForm(fullname, email, address, card, paymentMethod) {
    let isValid = true;

    document.getElementById('name-error').textContent = '';
    document.getElementById('email-error').textContent = '';
    document.getElementById('address-error').textContent = '';
    document.getElementById('card-error').textContent = '';

    if (!fullname) {
      document.getElementById('name-error').textContent = 'Full name is required';
      isValid = false;
    } else if (/\d/.test(fullname)) {
      document.getElementById('name-error').textContent = 'Name cannot contain numbers';
      isValid = false;
    }

    if (!email) {
      document.getElementById('email-error').textContent = 'Email is required';
      isValid = false;
    } else {
      const emailParts = email.split('@');
      if (emailParts.length !== 2) {
        document.getElementById('email-error').textContent = 'Must contain @ symbol';
        isValid = false;
      } else {
        const domain = emailParts[1];
         if (!domain.match(/\.(com|net|org|edu\.eg)$/)) {
          document.getElementById('email-error').textContent = 'Email must end with .com, .net, .org, or .edu.eg';
          isValid = false;
        }
      }
    }

    if (!address) {
      document.getElementById('address-error').textContent = 'Delivery address is required';
      isValid = false;
    }

    if (paymentMethod === 'card') {
      const cleanCard = card.replace(/\s/g, '');
      if (!cleanCard) {
        document.getElementById('card-error').textContent = 'Card number is required';
        isValid = false;
      } else if (!/^\d{16}$/.test(cleanCard)) {
        document.getElementById('card-error').textContent = 'Card must be 16 digits, numbers only';
        isValid = false;
      }
    }

    return isValid;
  }

  document.getElementById('checkoutForm').onsubmit = async function(e) {
    e.preventDefault();

    if (!protectPage()) return;

    const fullname = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const address = document.getElementById('address').value.trim();
    const card = document.getElementById('card').value.trim();
    const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
    const currentCart = loadCart();

    if (!currentCart.length) {
      alert('Your cart is empty.');
      return;
    }

    if (validateForm(fullname, email, address, card, paymentMethod)) {
      try {
        const response = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            ...authHeaders()
          },
          body: JSON.stringify({
            customerName: fullname,
            email,
            address,
            paymentMethod,
            items: currentCart
          })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Could not place order.');

        localStorage.removeItem('coffeeCart');
        updateHeaderBadge();
        document.getElementById('checkout-main').style.display = 'none';
        document.getElementById('order-success').style.display = 'block';
      } catch (error) {
        alert(error.message);
      }
    }
  };

  document.addEventListener('DOMContentLoaded', function() {
    updateHeaderBadge();
    renderOrderSummary();

    const paymentRadios = document.querySelectorAll('input[name="payment"]');
    const cardGroup = document.getElementById('card-group');

    paymentRadios.forEach(radio => {
      radio.addEventListener('change', function() {
        if (this.value === 'cash') {
          cardGroup.style.display = 'none';
        } else {
          cardGroup.style.display = 'block';
        }
      });
    });

    if (document.querySelector('input[name="payment"]:checked').value === 'cash') {
      cardGroup.style.display = 'none';
    }
  });

  const resetBtn = document.createElement('button');
  resetBtn.textContent = 'Reset Cart';
  resetBtn.className = 'reset-cart-btn';
  resetBtn.onclick = function() {
    localStorage.removeItem('coffeeCart');
    location.reload();
  };
  document.body.appendChild(resetBtn);
</script>
</body>
</html>
