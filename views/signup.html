<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up &mdash; Mr. Beans Coffee</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
  <div class="logo">
    <img src="/images/logo.jpg" alt="Mr. Beans Coffee" class="logo-img">
    <span>Mr. Beans Coffee</span>
  </div>
  <nav>
    <a href="/" data-i18n="home">Home</a>
    <a href="/shop" data-i18n="shop">Shop</a>
    <a href="/contact" data-i18n="contact">Contact</a>
    <a href="/login" data-i18n="login">Login</a>
  </nav>
  <div class="cart-icon">&#128722; <span class="cart-count">0</span></div>
</header>

<main class="auth-page">
  <section class="auth-card">
    <h1 data-i18n="signupTitle">Create Account</h1>
    <p data-i18n="signupSubtitle">New accounts are created as normal user accounts.</p>
    <form id="signupForm">
      <div class="form-group">
        <label for="name" data-i18n="fullNameLabel">Full Name</label>
        <input type="text" id="name" required placeholder="Amr Hassan">
      </div>
      <div class="form-group">
        <label for="email" data-i18n="emailLabel">Email</label>
        <input type="email" id="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password" data-i18n="passwordLabel">Password</label>
        <input type="password" id="password" required minlength="8" data-i18n-placeholder="passwordHint" placeholder="Uppercase, lowercase, number, special character"/>
      </div>
      <button type="submit" class="place-order-btn" data-i18n="signupBtn">Sign Up</button>
    </form>
    <p id="auth-message"></p>
    <p class="switch-auth"><span data-i18n="haveAccount">Already have an account?</span> <a href="/login" data-i18n="login">Login</a></p>
  </section>
</main>

<script src="/js/i18n.js"></script>
<script src="/js/currency.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/login.js"></script>
</body>
</html>
